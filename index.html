<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KS Gestão & BPO — Sistema de Controle Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

<style>
  :root {
    --c-primary: #6366F1;
    --c-primary-rgb: 99, 102, 241;
    --c-primary-soft: rgba(99, 102, 241, 0.10);
    --c-bg: #fafafb;
    --c-bg-sidebar: #0F1729;
    --c-surface: #fff;
    --c-card: #fff;
    --c-text: #0F172A;
    --c-text-muted: #64748B;
    --c-border: #E2E8F0;
    --font-family: 'Inter', system-ui, sans-serif;
    /* Cores semânticas (badges/pills) — claras */
    --c-green-bg: #dcfce7; --c-green-fg: #166534;
    --c-red-bg: #fee2e2; --c-red-fg: #991b1b;
    --c-blue-bg: #dbeafe; --c-blue-fg: #1e40af;
    --c-amber-bg: #fef3c7; --c-amber-fg: #92400e;
  }

  /* Cores semânticas no modo escuro — fundo translúcido + texto claro */
  body.dark {
    --c-green-bg: rgba(22, 163, 74, 0.15); --c-green-fg: #4ade80;
    --c-red-bg: rgba(220, 38, 38, 0.15); --c-red-fg: #f87171;
    --c-blue-bg: rgba(37, 99, 235, 0.15); --c-blue-fg: #60a5fa;
    --c-amber-bg: rgba(245, 158, 11, 0.15); --c-amber-fg: #fbbf24;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-family);
    background: var(--c-bg);
    color: var(--c-text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body.dark { color-scheme: dark; }
  body.dark ::-webkit-scrollbar-thumb { background: #2a2a3a; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; border: 2px solid var(--c-bg); }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  button { font-family: inherit; }
  table th, table td { vertical-align: middle; }

  /* Inputs in dark mode */
  body.dark input, body.dark select, body.dark textarea {
    background: #1d1d27 !important; color: var(--c-text) !important; border-color: var(--c-border) !important;
  }
  body.dark input::placeholder, body.dark textarea::placeholder { color: #6b6f80; }

  /* Print styles for comprovante */
  @media print {
    body * { visibility: hidden; }
    .modal-print, .modal-print * { visibility: visible; }
  }

  /* Tweaks panel sits at bottom-right - extra spacing */
  #__tweaks-panel { z-index: 90; }

  /* ===== Responsividade ===== */
  /* Tablet e abaixo */
  @media (max-width: 768px) {
    body { font-size: 13px; }

    /* Reduz paddings de página/headers */
    [style*="padding: 28px"] { padding: 16px !important; }
    [style*="padding: 20px 28px"] { padding: 16px !important; }
    [style*="padding: 24px"] { padding: 14px !important; }

    /* Cabeçalhos de página quebram linha */
    [style*="justify-content: space-between"][style*="align-items: flex-start"] { flex-wrap: wrap !important; }

    /* Colapsa grids de múltiplas colunas */
    [style*="grid-template-columns: repeat(4, 1fr)"] { grid-template-columns: repeat(2, 1fr) !important; }
    [style*="grid-template-columns: repeat(3, 1fr)"] { grid-template-columns: repeat(2, 1fr) !important; }
    [style*="grid-template-columns: 2fr 1fr"] { grid-template-columns: 1fr !important; }
    [style*="grid-template-columns: 1.4fr 1fr"] { grid-template-columns: 1fr !important; }
    [style*="grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr 1fr auto"] { grid-template-columns: 1fr 1fr !important; }
    [style*="grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
    [style*="grid-template-columns: repeat(6, 1fr) auto"] { grid-template-columns: 1fr 1fr !important; }

    /* Tabelas com rolagem horizontal */
    table { display: block; overflow-x: auto; max-width: 100%; -webkit-overflow-scrolling: touch; }
    thead, tbody, tfoot { width: 100%; }
  }

  /* Celular */
  @media (max-width: 520px) {
    [style*="grid-template-columns: repeat(4, 1fr)"],
    [style*="grid-template-columns: repeat(3, 1fr)"],
    [style*="grid-template-columns: repeat(2, 1fr)"],
    [style*="grid-template-columns: 1fr 1fr"],
    [style*="grid-template-columns: 1fr 1fr 1fr"],
    [style*="grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr 1fr auto"],
    [style*="grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr"],
    [style*="grid-template-columns: repeat(6, 1fr) auto"] { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- SheetJS for XLSX export -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- App modules -->
<script type="text/babel" src="supabase.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="hooks.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="xlsx-export.jsx"></script>
<script type="text/babel" src="central.jsx"></script>
<script type="text/babel" src="workspace.jsx"></script>
<script type="text/babel" src="reports.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
